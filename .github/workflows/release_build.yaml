name: Release Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - AGENTS.md
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version segment to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'faisal-memon/semver-bump-action@')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump and write version tag
        id: bump
        uses: faisal-memon/semver-bump-action@v0.0.4
        with:
          version-bump: ${{ github.event_name == 'workflow_dispatch' && inputs.version_bump || '' }}
          commit-message: ${{ github.event.head_commit.message || '' }}
          commits-json: ${{ toJson(github.event.commits) }}
          write-tag: "true"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.new-tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
