name: Release Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - AGENTS.md
      - README.md
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version segment to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, format('Bump {0} from', github.repository))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: Bump and write version tag
        id: bump
        uses: faisal-memon/simple-semver@v0.0.14
        with:
          version-bump: ${{ github.event_name == 'workflow_dispatch' && inputs.version_bump || '' }}
          write-major-tag: "true"
          github-token: ${{ github.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.new-tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
