name: Release Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - AGENTS.md
      - README.md
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version segment to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      label_branch:
        description: Branch whose PR labels should drive version bump (defaults to repository default branch)
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'faisal-memon/simple-semver@')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: Resolve version bump from PR labels
        id: resolve-bump
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.request(
              "GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls",
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              }
            );

            const defaultBranch = context.payload.repository?.default_branch || "main";
            const configuredBranch = `${{ inputs.label_branch || '' }}`.trim();
            const targetBranch = configuredBranch || defaultBranch;

            const matchingPulls = pulls.filter((pr) => pr.base?.ref === targetBranch);
            if (matchingPulls.length === 0) {
              core.info(`No PR found for commit on target branch '${targetBranch}'. Defaulting to patch.`);
              core.setOutput("version_bump", "patch");
              return;
            }

            const selectedPr = matchingPulls[0];
            core.info(`Using PR #${selectedPr.number} on branch '${selectedPr.base.ref}' for label lookup.`);

            const labelSet = new Set((selectedPr.labels || []).map((label) => label.name));
            const selected = ["major", "minor", "patch"].filter((name) => labelSet.has(name));

            if (selected.length > 1) {
              core.setFailed(
                `Multiple version labels found on PR #${selectedPr.number}: ${selected.join(", ")}. Use only one of major/minor/patch.`
              );
              return;
            }

            const bump = selected[0] || "patch";
            core.info(`Resolved version bump: ${bump}`);
            core.setOutput("version_bump", bump);

      - name: Bump and write version tag
        id: bump
        uses: faisal-memon/simple-semver@v0.0.4
        with:
          version-bump: ${{ github.event_name == 'workflow_dispatch' && inputs.version_bump || steps.resolve-bump.outputs.version_bump }}
          write-tag: "true"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.new-tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
