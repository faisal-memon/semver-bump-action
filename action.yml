name: simple-semver
description: Simple semantic version bump action with optional retry-safe tag writes.
author: Faisal Memon

inputs:
  version-bump:
    description: Explicit version bump override (`major`, `minor`, `patch`). When empty, resolves from PR labels and defaults to patch.
    required: false
    default: ""
  tag-prefix:
    description: Prefix to apply to the generated tag.
    required: false
    default: v
  github-token:
    description: GitHub token used to resolve PR labels for bump selection.
    required: false
    default: ""
  label-branch:
    description: Optional branch name used to select which PR labels to inspect. Defaults to the triggering branch.
    required: false
    default: ""
  write-tag:
    description: When true, create and push the computed tag to origin with retries on tag collisions.
    required: false
    default: "true"

outputs:
  new-tag:
    description: The computed next semantic version tag.
    value: ${{ steps.bump.outputs.new-tag }}
  previous-tag:
    description: The latest existing semantic version tag, or the zero baseline when none exist.
    value: ${{ steps.bump.outputs.previous-tag }}
  version-bump-used:
    description: The bump type that was ultimately applied.
    value: ${{ steps.bump.outputs.version-bump-used }}

runs:
  using: composite
  steps:
    - name: Compute semantic version bump
      id: bump
      shell: bash
      env:
        INPUT_VERSION_BUMP: ${{ inputs.version-bump }}
        INPUT_TAG_PREFIX: ${{ inputs.tag-prefix }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_LABEL_BRANCH: ${{ inputs.label-branch }}
        INPUT_WRITE_TAG: ${{ inputs.write-tag }}
      run: "${{ github.action_path }}/bump_semver.sh"

branding:
  icon: tag
  color: blue
